<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - MediChain</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/doctor.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>MediChain</h2>
                <p>Doctor Portal</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="documents.html" class="nav-item"><i class="fas fa-folder-open"></i><span>Patient
                        Records</span></a>
                <a href="access.html" class="nav-item"><i class="fas fa-key"></i><span>Access History</span></a>
                <a href="#" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-md"></i>
                    <div>
                        <p class="user-name" id="userName">Loading...</p>
                        <p class="user-did" id="userDid"></p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Doctor Dashboard</h1>
                <button id="refreshBtn" class="btn-primary"><i class="fas fa-sync-alt"></i> Refresh</button>
            </header>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div>
                        <h3>Total Patients</h3>
                        <p id="totalPatients">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-file-medical"></i>
                    <div>
                        <h3>Available Records</h3>
                        <p id="availableRecords">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>Active Accesses</h3>
                        <p id="activeAccesses">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-hourglass-half"></i>
                    <div>
                        <h3>Expiring Soon</h3>
                        <p id="expiringSoon">0</p>
                    </div>
                </div>
            </div>

            <!-- Request Access Form -->
            <div class="request-access">
                <h3>Request Access from Patient</h3>
                <input type="text" id="patientDid" placeholder="Patient DID">
                <button onclick="requestAccess()">Send Request</button>
            </div>

            <!-- Recent Patient Records (horizontal scroll) -->
            <section class="recent-access">
                <h2>Recent Patient Records</h2>
                <div id="recentAccess" class="access-cards-wrapper">
                    <!-- Cards will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- EHR View Modal -->
    <div id="accessModal" class="modal" style="display:none;">
        <div class="modal-content large">
            <div class="modal-header">
                <h2><i class="fas fa-file-medical"></i> Medical Record</h2>
                <button class="close-btn" onclick="closeAccessModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="documentPreview">Loading...</pre>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeAccessModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/utils/ipfs-manager.js"></script>
    <script src="../../assets/js/utils/proxy-manager.js"></script>
    <script src="../../assets/js/utils/contract-manager.js"></script>
    <script src="../../assets/js/utils/doctor.js"></script>


    <script src="../../assets/js/utils/crypto-utils.js"></script>
    <script src="../../assets/js/utils/proxy-helper.js"></script>

</body>

</html>
