<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor - Access History</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/doctor.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>MediChain</h2>
                <p>Doctor Portal</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="documents.html" class="nav-item"><i class="fas fa-folder-open"></i><span>Documents</span></a>
                <a href="access.html" class="nav-item active"><i class="fas fa-key"></i><span>Access History</span></a>
                <a href="#" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-md"></i>
                    <div>
                        <p class="user-name" id="userName">Loading...</p>
                        <p class="user-did" id="userDid"></p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Access History</h1>
                <div class="header-actions">
                    <button class="btn-primary" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </header>

            <!-- Table of accesses -->
            <div class="table-container">
                <table class="access-table">
                    <thead>
                        <tr>
                            <th>Patient</th>
                            <th>Record</th>
                            <th>Granted At</th>
                            <th>Expires</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="accessTableBody">
                        <!-- Dynamic rows -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../../assets/js/utils/ipfs-manager.js"></script>
    <script src="../../assets/js/utils/proxy-manager.js"></script>
    <script src="../../assets/js/utils/contract-manager.js"></script>
    <script src="../../assets/js/utils/access.js"></script>
</body>
</html>
