<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Department - Revoke Doctor</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/revoke.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>MediChain</h2>
                <p>Health Department</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="doctors.html" class="nav-item"><i class="fas fa-user-md"></i><span>Manage Doctors</span></a>
                <a href="revoke.html" class="nav-item active"><i class="fas fa-ban"></i><span>Revoke License</span></a>
                <a href="#" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-hospital"></i>
                    <div>
                        <p class="user-name" id="userName">Loading...</p>
                        <p class="user-did" id="userDid"></p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Revoke Doctor License</h1>
                <div class="header-actions">
                    <button class="btn-primary" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </header>

            <!-- Revocation Form -->
            <section class="revoke-form-section">
                <h2><i class="fas fa-user-slash"></i> Revoke a Doctor</h2>
                <form id="revokeForm">
                    <div class="form-group">
                        <label for="doctorDid">Doctor DID</label>
                        <input type="text" id="doctorDid" placeholder="did:key:..." required>
                    </div>
                    <button type="submit" class="btn-danger"><i class="fas fa-ban"></i> Revoke License</button>
                </form>
            </section>

            <!-- Recently Revoked List -->
            <section class="revoked-list-section">
                <h2><i class="fas fa-history"></i> Recently Revoked</h2>
                <div class="table-container">
                    <table class="revoked-table">
                        <thead>
                            <tr>
                                <th>Doctor DID</th>
                                <th>Name</th>
                                <th>Revoked At</th>
                                <th>Revoked By</th>
                            </tr>
                        </thead>
                        <tbody id="revokedTableBody">
                            <!-- Dynamic rows -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../../assets/js/utils/contract-manager.js"></script>
    <script src="../../assets/js/health-revoke.js"></script>
</body>
</html>
